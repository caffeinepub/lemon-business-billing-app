<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemon Billing App</title>
    <meta name="description" content="Manage your lemon business billing, customers, and credit tracking." />
    <meta name="theme-color" content="#f5c518" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lemon Billing" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/generated/pwa-icon-192.dim_192x192.png" />
    <link rel="icon" type="image/png" href="/assets/generated/lemon-logo.dim_128x128.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').then(
            function (registration) {
              console.log('SW registered:', registration.scope);
            },
            function (err) {
              console.log('SW registration failed:', err);
            }
          );
        });
      }
    </script>
  </body>
</html>
